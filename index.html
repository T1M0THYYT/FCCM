<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Commands | Commands Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body class="h-screen overflow-hidden">
    <div id="devtools-warning" class="fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 p-3 rounded z-50 hidden">⚠
        Developer tools disabled!</div>

    <div class="flex h-full w-full">


        <main class="flex-1 bg-zinc-100 text-gray-800 overflow-y-auto p-8">
            <div class="max-w-3xl mx-auto space-y-8">
                <button onclick="toggleSidebar()" id="menubtn"
                    class="md:hidden mb-4 bg-zinc-800 text-white px-4 py-2 rounded-lg">
                    ☰ Menu
                </button>
                <header class="text-center">
                    <h2 class="text-4xl font-extrabold text-zinc-900">Fast Commands' Command Manager (FCCM)</h2>
                    <p class="text-zinc-500">Modify categories and export your .mcpack</p>
                </header>

                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search categories..."
                        class="w-full p-3 pl-10 rounded-xl border border-zinc-300 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <i class="fa fa-search absolute left-4 top-4 text-zinc-400"></i>
                </div>

                <section class="bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
                    <h3 class="text-xl font-bold mb-4 flex items-center"><i
                            class="fas fa-folder-plus mr-2 text-blue-600"></i>Add New Category</h3>
                    <form id="addCategoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="newCategoryName" placeholder="Category Name"
                            class="p-2 border rounded-lg" required>
                        <input type="text" id="newCategoryDescription" placeholder="Description"
                            class="p-2 border rounded-lg" required>
                        <button type="submit"
                            class="md:col-span-2 bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Create
                            Category</button>
                    </form>
                </section>

                <section class="bg-green-50 p-6 rounded-2xl shadow-sm border border-green-200">
                    <h3 class="text-xl font-bold mb-4 text-green-800"><i class="fas fa-file-export mr-2"></i>Export
                        Texture Pack</h3>
                    <form id="exportForm" class="space-y-4">
                        <input type="text" id="packName" placeholder="Pack Name" class="w-full p-2 border rounded-lg"
                            required>
                        <textarea id="packDescription" placeholder="Pack Description"
                            class="w-full p-2 border rounded-lg"></textarea>
                        <button type="submit"
                            class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">Download
                            .mcpack</button>
                    </form>
                </section>
            </div>
        </main>

        <aside class="cmdbar">
            <div class="p-4 border-b border-zinc-800 bg-zinc-800">
                <h1 class="text-center font-bold uppercase tracking-widest text-sm text-gray-300">Quick Commands</h1>
            </div>

            <div id="dataContainer" class="flex-1 overflow-y-auto sidebar-scroll">
            </div>

            <div class="p-4 bg-zinc-800 text-[10px] text-zinc-400 border-t border-zinc-700">
                <p class="font-bold uppercase mb-1">Creator and Credits</p>
                <div class="flex items-center space-x-2 bg-zinc-900 p-2 rounded">
                    <div class="w-8 h-8 bg-blue-600 rounded-sm flex items-center justify-center text-white font-bold">T
                    </div>
                    <div>
                        <p class="text-white text-[12px]">@T1M0THYYt</p>
                        <p class="text-[10px]">Fast Commands Creator</p>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <div id="addCommandModal"
        class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white text-gray-800 rounded-xl p-8 w-full max-w-md relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black"><i
                    class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="text-2xl font-bold mb-4">New Command</h3>
            <form id="addCommandForm" class="space-y-4">
                <input type="text" id="commandInput" placeholder="/command" class="w-full p-2 border rounded-lg"
                    required>
                <input type="text" id="tooltipInput" placeholder="Tooltip (Optional)"
                    class="w-full p-2 border rounded-lg">
                <input type="text" id="ButtonLabelInput" placeholder="Button Suffix (Optional)"
                    class="w-full p-2 border rounded-lg">
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="isChatInput" class="w-4 h-4">
                    <label for="isChatInput" class="text-sm">Is this a chat message?</label>
                </div>
                <input type="hidden" id="currentCategoryId">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Add
                    Command</button>
            </form>
        </div>
    </div>

    <script src="./scripts.js">

    </script>
</body>

</html>
